name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  # Job 1: Build, Test, and Deploy React Frontend to AWS S3
  frontend-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Frontend to S3 Bucket
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.AWS_S3_BUCKET_NAME }} --delete

  # Job 2: Build, Push Docker Image, and Deploy Express Backend to Ubuntu VM
  backend-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/smart-restaurant-backend:latest

      - name: Deploy to Ubuntu VM via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.BACKEND_IP }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # Pull latest docker image
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/smart-restaurant-backend:latest
            
            # Stop and remove existing container if running
            docker stop smart-restaurant-backend || true
            docker rm smart-restaurant-backend || true
            
            # Run the new container
            docker run -d \
              --name smart-restaurant-backend \
              --restart always \
              -p 5000:5000 \
              -e PORT=5000 \
              -e MONGODB_URI="${{ secrets.MONGODB_URI }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e JWT_EXPIRE="7d" \
              -e NODE_ENV="production" \
              ${{ secrets.DOCKERHUB_USERNAME }}/smart-restaurant-backend:latest
