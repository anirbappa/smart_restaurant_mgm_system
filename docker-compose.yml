version: '3.8'

services:
  database:
    image: mongo:latest
    container_name: smart_restaurant_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - smart_restaurant_net

  backend:
    build: ./backend
    container_name: smart_restaurant_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://database:27017/smart_restaurant
      - JWT_SECRET=supersecretjwtkey12345!
      - JWT_EXPIRE=7d
      - NODE_ENV=production
    depends_on:
      - database
    networks:
      - smart_restaurant_net

  frontend:
    build: ./frontend
    container_name: smart_restaurant_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - smart_restaurant_net

volumes:
  mongo_data:

networks:
  smart_restaurant_net:
    driver: bridge
